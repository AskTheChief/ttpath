  <script w-tid="63">
    // Pause ticker on hover
    var ticker = document.querySelector('.ticker div');
    ticker.addEventListener('mouseover', function() {
      ticker.style.animationPlayState = 'paused';
    });
    ticker.addEventListener('mouseout', function() {
      ticker.style.animationPlayState = 'running';
    });

    // Buy The Book
    function buyBook() {
      var confirmationCode = '';
      var characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      for (var i = 0; i < 16; i++) {
        confirmationCode += characters.charAt(Math.floor(Math.random() * characters.length));
      }
      document.getElementById('confirmation-message').textContent = 'Your confirmation code is: ' + confirmationCode;
    }

    // Market Trading Game
    var balance = 1000;
    var stockPrice = 100;
    var sharesOwned = 0;

    function updateGameDisplay() {
      document.getElementById('balance').textContent = balance.toFixed(2);
      document.getElementById('stock-price').textContent = stockPrice.toFixed(2);
    }

    function buyStock() {
      if (balance >= stockPrice) {
        balance -= stockPrice;
        sharesOwned += 1;
        document.getElementById('game-message').textContent = 'You bought 1 share.';
      } else {
        document.getElementById('game-message').textContent = 'Insufficient funds to buy stock.';
      }
      updateGameDisplay();
    }

    function sellStock() {
      if (sharesOwned > 0) {
        balance += stockPrice;
        sharesOwned -= 1;
        document.getElementById('game-message').textContent = 'You sold 1 share.';
      } else {
        document.getElementById('game-message').textContent = 'You do not own any shares to sell.';
      }
      updateGameDisplay();
    }

    // Chart.js setup
    var ctx = document.getElementById('priceChart').getContext('2d');
    var priceData = [stockPrice];
    var labels = [new Date().toLocaleTimeString()];
    var priceChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Stock Price',
          data: priceData,
          borderColor: 'green',
          backgroundColor: 'rgba(0, 255, 0, 0.1)',
          fill: true,
          tension: 0.1
        }]
      },
      options: {
        scales: {
          x: {
            display: false
          },
          y: {
            beginAtZero: false
          }
        }
      }
    });

    // Simulate stock price changes
    setInterval(function() {
      var change = (Math.random() - 0.5) * 2; // Random change between -1 and 1
      stockPrice += change;
      if (stockPrice < 1) stockPrice = 1; // Minimum stock price

      // Update chart data
      if (priceData.length > 20) { // Keep last 20 data points
        priceData.shift();
        labels.shift();
      }
      priceData.push(stockPrice);
      labels.push(new Date().toLocaleTimeString());
      priceChart.update();

      updateGameDisplay();
    }, 2000);
  </script>
