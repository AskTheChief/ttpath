runConfig:
  minInstances: 0
  env:
    - variable: GEMINI_API_KEY
      secret: GEMINI_API_KEY
      availability:
        - RUNTIME
secretManager:
  - secret: GEMINI_API_KEY
    pin: latest
build:
  env:
    - variable: GEMINI_API_KEY
      secret: GEMINI_API_KEY
      availability:
        - BUILD